when:
  - event: push
    branch: main

steps:
  - name: Deploy project over SSH
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: SSH_HOST
      username:
        from_secret: SSH_USERNAME
      password:
        from_secret: SSH_PASSWORD
      port: 22
      envs:
        - DB_USER
        - DB_PASSWORD
        - DB_NAME
      script:
        - |
          if [ -d home-finances ]; then
            cd home-finances
            git pull --rebase -Xours
          else
            git clone https://github.com/Tauromachian/home-finances.git
            cd home-finances
          fi

          cat > .env << EOF
          APP_ENV=production
          DB_USER=$DB_USER
          DB_PASSWORD=$DB_PASSWORD
          DB_PORT=5432
          DB_NAME=$DB_NAME
          DB_HOST=db
          EOF

          docker compose down
          docker compose build --no-cache
          docker compose up -d

          docker exec home-finances-web-1 deno run db:push
    environment:
      DB_USER:
        from_secret: DB_USER
      DB_PASSWORD:
        from_secret: DB_PASSWORD
      DB_NAME:
        from_secret: DB_NAME
